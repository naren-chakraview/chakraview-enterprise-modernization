# Namespace-level ResourceQuotas and LimitRanges — Bulkhead isolation (ADR-0013)
#
# Quota formula: limits.cpu × max_replicas × 1.2 (20% headroom)
#                limits.memory × max_replicas × 1.2
# Source of truth for per-service sizing: tooling/service-manifest.yaml
# Update here whenever service-manifest.yaml resources or hpa.max_replicas changes.

---
# ─── Orders namespace ───────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: orders-quota
  namespace: chakra-orders
  annotations:
    adr: "ADR-0013"
    formula: "500m CPU × 10 replicas × 1.2 = 6 cores; 512Mi × 10 × 1.2 = 6Gi"
spec:
  hard:
    requests.cpu: "1"
    requests.memory: "2560Mi"
    limits.cpu: "6"
    limits.memory: "6144Mi"
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: orders-limits
  namespace: chakra-orders
  annotations:
    adr: "ADR-0013"
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      max:
        cpu: "500m"
        memory: "512Mi"

---
# ─── Inventory namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: inventory-quota
  namespace: chakra-inventory
  annotations:
    adr: "ADR-0013"
    formula: "500m CPU × 20 replicas × 1.2 = 12 cores; 512Mi × 20 × 1.2 = 12Gi"
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "5120Mi"
    limits.cpu: "12"
    limits.memory: "12288Mi"
    pods: "40"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: inventory-limits
  namespace: chakra-inventory
  annotations:
    adr: "ADR-0013"
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      max:
        cpu: "500m"
        memory: "512Mi"

---
# ─── Customers namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: customers-quota
  namespace: chakra-customers
  annotations:
    adr: "ADR-0013"
    formula: "250m CPU × 5 replicas × 1.2 = 1.5 cores; 256Mi × 5 × 1.2 = 1.5Gi"
spec:
  hard:
    requests.cpu: "250m"
    requests.memory: "640Mi"
    limits.cpu: "1500m"
    limits.memory: "1536Mi"
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: customers-limits
  namespace: chakra-customers
  annotations:
    adr: "ADR-0013"
spec:
  limits:
    - type: Container
      default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "128Mi"
      max:
        cpu: "250m"
        memory: "256Mi"

---
# ─── Fulfillment namespace ───────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: fulfillment-quota
  namespace: chakra-fulfillment
  annotations:
    adr: "ADR-0013"
    note: "Intentionally tight — background service; a leak here must not affect Orders"
    formula: "250m CPU × 4 replicas × 1.2 = 1.2 cores; 256Mi × 4 × 1.2 = 1.2Gi"
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: "512Mi"
    limits.cpu: "1200m"
    limits.memory: "1229Mi"
    pods: "8"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: fulfillment-limits
  namespace: chakra-fulfillment
  annotations:
    adr: "ADR-0013"
spec:
  limits:
    - type: Container
      default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "128Mi"
      max:
        cpu: "250m"
        memory: "256Mi"
