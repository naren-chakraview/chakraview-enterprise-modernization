# CI pipeline for the Orders service
# Generated by tooling/generate-ci-workflow.sh orders typescript

name: CI — Orders Service

on:
  push:
    branches: [main]
    paths:
      - 'services/orders/**'
      - 'contracts/slas/orders-sla.yaml'
      - 'contracts/domain-invariants/orders-invariants.md'
      - 'contracts/event-schemas/Order*.json'
  pull_request:
    paths:
      - 'services/orders/**'
      - 'contracts/slas/orders-sla.yaml'
      - 'contracts/domain-invariants/orders-invariants.md'
      - 'contracts/event-schemas/Order*.json'

jobs:
  validate-contracts:
    name: Validate contract coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run contract validation
        run: ./tooling/validate-contracts.sh

  lint-typecheck:
    name: Lint and type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/orders/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Domain unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/orders/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orders-coverage
          path: services/orders/coverage/

  build-image:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/orders
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/chakra-orders:${{ github.sha }}
            ${{ secrets.ECR_REGISTRY }}/chakra-orders:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update Helm chart image tag
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" \
            infrastructure/helm/charts/orders-service/values-staging.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/helm/charts/orders-service/values-staging.yaml
          git commit -m "ci(orders): update staging image tag to ${{ github.sha }}"
          git push
